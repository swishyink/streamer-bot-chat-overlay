<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer.bot Chat Overlay</title>

    <!-- Streamer.bot WebSocket Client (CDN) -->
    <script src="https://unpkg.com/@streamerbot/client@latest/dist/streamerbot-client.js"></script>

    <style>
        /* ============================================================
       Streamer.bot-Style Scrolling Chat Overlay — CSS
       ============================================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #niconico-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- Alternative Chat Modes --- */
        #niconico-container.layout-vertical {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            gap: 12px;
            padding: 24px;
        }

        #niconico-container.layout-horizontal {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-content: flex-end;
            align-items: flex-end;
            gap: 16px;
            padding: 24px;
        }

        #niconico-container.layout-vertical .nico-msg,
        #niconico-container.layout-horizontal .nico-msg {
            position: relative; /* Override absolute positioning */
            animation: none;    /* Disable scrolling animations */
            transform: none !important;
            will-change: auto;
        }

        /* --- Alternative Layout Animations --- */
        .layout-vertical .move-scroll, .layout-horizontal .move-scroll {
            animation: slideInSide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
        }

        .layout-vertical .move-plaster, .layout-horizontal .move-plaster {
            animation: plasterSlam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
        }

        .layout-vertical .move-float, .layout-horizontal .move-float {
            animation: slideUpIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        }

        .layout-vertical .move-zoom, .layout-horizontal .move-zoom {
            animation: zoomInPopup 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
        }

        .layout-vertical .move-swing, .layout-horizontal .move-swing {
            animation: dropAndSwing 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
            transform-origin: top center;
        }

        @keyframes slideInSide {
            0% { transform: translateX(50px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideUpIn {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Default Pop-in fallback for alternative layouts */
        .animate-pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
        }

        @keyframes popIn {
            0% { transform: scale(0.8) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* --- Base Message --- */
        .nico-msg {
            position: absolute;
            white-space: nowrap;
            font-weight: 900;
            line-height: 1.3;
            pointer-events: none;
            will-change: transform;
            font-family: var(--nico-font, 'Arial Black', 'Impact', sans-serif);
            font-size: var(--nico-font-size, 32px);
            color: var(--nico-color, #FFFFFF);
        }

        /* --- Movement Animations --- */
        .move-scroll {
            animation: slideInRight var(--nico-speed, 8s) linear forwards;
        }

        .move-plaster {
            animation: plasterSlam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                fadeOutDown 0.5s calc(var(--nico-speed, 8s) - 0.5s) ease-in forwards;
        }

        .move-float {
            animation: floatUp var(--nico-speed, 8s) cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .move-zoom {
            animation: zoomInPopup 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                fadeOutScale 0.5s calc(var(--nico-speed, 8s) - 0.5s) cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        .move-swing {
            animation: dropAndSwing 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                fadeOutUp 0.5s calc(var(--nico-speed, 8s) - 0.5s) ease-in forwards;
            transform-origin: top center;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100vw);
            }

            to {
                transform: translateX(-100vw) translateX(-100%);
            }
        }

        @keyframes plasterSlam {
            0% {
                transform: scale(3) rotate(15deg);
                opacity: 0;
                filter: blur(10px);
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
                filter: blur(0);
            }
        }

        @keyframes fadeOutDown {
            0% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }

            100% {
                transform: scale(0.9) translateY(20vh);
                opacity: 0;
                filter: blur(5px);
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) translateX(0);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            95% {
                opacity: 1;
            }

            100% {
                transform: translateY(-30vh) translateX(0);
                opacity: 0;
            }
        }

        @keyframes zoomInPopup {
            0% {
                transform: scale(0.5) translateY(20px);
                opacity: 0;
                filter: blur(8px);
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        @keyframes fadeOutScale {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0);
            }

            100% {
                transform: scale(0.8);
                opacity: 0;
                filter: blur(4px);
            }
        }

        @keyframes dropAndSwing {
            0% {
                transform: translateY(-50vh) rotate(-15deg);
                opacity: 0;
            }

            40% {
                transform: translateY(0) rotate(10deg);
                opacity: 1;
            }

            60% {
                transform: rotate(-6deg);
            }

            80% {
                transform: rotate(3deg);
            }

            100% {
                transform: rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes fadeOutUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-20vh);
                opacity: 0;
                filter: blur(5px);
            }
        }

        /* --- Text Shadow Variants --- */
        .nico-msg.shadow-none {
            text-shadow: none;
        }

        .nico-msg.shadow-light {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5), -1px -1px 2px rgba(0, 0, 0, 0.3);
        }

        .nico-msg.shadow-heavy {
            text-shadow:
                2px 2px 0 #000, -2px -2px 0 #000,
                2px -2px 0 #000, -2px 2px 0 #000,
                0 2px 0 #000, 0 -2px 0 #000,
                2px 0 0 #000, -2px 0 0 #000;
        }

        /* --- Letter/Word Reveal Animation --- */
        .nico-msg .nico-char {
            display: inline-block;
            opacity: 0;
            animation: charReveal 0.3s ease forwards;
        }

        @keyframes charReveal {
            0% {
                opacity: 0;
                transform: translateY(8px) scale(0.7);
                filter: blur(4px);
            }

            60% {
                transform: translateY(-2px) scale(1.05);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        :root {
            /* Keep existing */
            --nico-bg: rgba(0, 0, 0, 0.4);
            --nico-color: #fff;
            --nico-font: 'Arial', sans-serif;
            --nico-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);

            /* Chic Overhaul Core Variables */
            --font-chic: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            --font-playful: 'Quicksand', 'Nunito', 'Varela Round', sans-serif;
            --shadow-soft: 0 12px 36px -4px rgba(0, 0, 0, 0.15), 0 4px 12px -2px rgba(0, 0, 0, 0.08);
            --shadow-neon: 0 0 15px rgba(255, 255, 255, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.1);
            --border-thin: var(--nico-border-width, 1px) solid rgba(255, 255, 255, 0.12);
            --border-solid-thin: var(--nico-border-width, 1px) solid rgba(0, 0, 0, 0.1);
            --border-radius-pill: 99px;
            --border-radius-soft: 16px;
        }

        /* Enforce blur filter performance */
        .nico-msg {
            transform: translateZ(0);
            will-change: transform, left, top, opacity;
        }

        /* --- Bubble Styles --- */
        .bubble-none {
            /* intentionally unstyled — classic NicoNico look */
            font-family: var(--font-chic);
        }

        .bubble-rounded .nico-inner {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: var(--border-thin);
            border-radius: var(--border-radius-pill);
            padding: 8px 24px;
            font-family: var(--font-chic);
            box-shadow: var(--shadow-soft);
        }

        /* --- Frosted Glass --- */
        .bubble-glass .nico-inner {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: var(--nico-border-width, 1px) solid rgba(255, 255, 255, 0.15);
            border-top: var(--nico-border-width, 1px) solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius-soft);
            padding: 10px 24px;
            color: #fff !important;
            box-shadow: 0 16px 32px 0 rgba(0, 0, 0, 0.15);
            font-family: var(--font-chic);
            font-weight: 300;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        /* --- Neumorphic (Soft Extrude) --- */
        .bubble-neumorphic .nico-inner {
            background: #e6e9ef;
            color: #4a5568 !important;
            border-radius: var(--border-radius-pill);
            padding: 10px 24px;
            font-family: var(--font-chic);
            font-weight: 500;
            text-shadow: none;
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.5), -6px -6px 12px rgba(255, 255, 255, 0.8);
            border: var(--nico-border-width, 1px) solid rgba(255, 255, 255, 0.4);
        }

        /* --- Gradient Edge --- */
        .bubble-gradient-edge .nico-inner {
            position: relative;
            background: #111;
            color: #fff !important;
            border-radius: 12px;
            padding: 10px 24px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-shadow: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background-clip: padding-box;
            border: 3px solid transparent;
        }

        .bubble-gradient-edge .nico-inner::after {
            position: absolute;
            top: -3px;
            bottom: -3px;
            left: -3px;
            right: -3px;
            background: linear-gradient(60deg, #f79533, #f37055, #ef4e7b, #a166ab, #5073b8, #1098ad, #07b39b, #6fba82);
            content: '';
            z-index: -1;
            border-radius: 14px;
            animation: rotateGradient 4s linear infinite;
        }

        @keyframes rotateGradient {
            0% {
                filter: hue-rotate(0deg);
            }

            100% {
                filter: hue-rotate(360deg);
            }
        }

        /* --- Editorial Brutalist --- */
        .bubble-editorial .nico-inner {
            background: #fff;
            color: #000 !important;
            border: 4px solid #000;
            border-radius: 0;
            padding: 10px 24px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: none;
            box-shadow: 8px 8px 0px #000;
        }

        /* --- Speech Bubble (Chic Minimal Dot) --- */
        .bubble-speech .nico-inner {
            position: relative;
            background: #fdfdfd;
            background-image: radial-gradient(#e0e0e0 10%, transparent 11%);
            background-size: 6px 6px;
            color: #1a1a2e !important;
            border: 1.5px solid #1a1a2e;
            border-radius: var(--border-radius-soft);
            padding: 10px 22px;
            box-shadow: 4px 4px 0 rgba(26, 26, 46, 0.9);
            text-shadow: none;
            font-family: var(--font-chic);
            font-weight: 600;
        }

        .bubble-speech .nico-inner::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 2px solid transparent;
            border-top: 10px solid #1a1a2e;
            transform: rotate(-10deg);
        }

        .bubble-speech .nico-inner::before {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 22px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 1px solid transparent;
            border-top: 8px solid #fdfdfd;
            transform: rotate(-10deg);
            z-index: 1;
        }

        /* --- Neon Glow (Chic OLED) --- */
        .bubble-glow .nico-inner {
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: var(--nico-border-width, 1px) solid var(--nico-color, #00e5ff);
            border-radius: var(--border-radius-pill);
            padding: 8px 24px;
            font-family: var(--font-chic);
            font-weight: 300;
            letter-spacing: 0.5px;
            animation: neonPulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }

        @keyframes neonPulse {
            0% {
                box-shadow: 0 0 8px rgba(0, 229, 255, 0.2), inset 0 0 4px rgba(0, 229, 255, 0.1);
                text-shadow: 0 0 4px var(--nico-color, #00e5ff), 0 0 8px rgba(0, 229, 255, 0.2);
                border-color: rgba(0, 229, 255, 0.4);
            }

            100% {
                box-shadow: 0 0 16px rgba(0, 229, 255, 0.4), inset 0 0 8px rgba(0, 229, 255, 0.2);
                text-shadow: 0 0 8px var(--nico-color, #00e5ff), 0 0 16px rgba(0, 229, 255, 0.6);
                border-color: rgba(0, 229, 255, 0.8);
            }
        }

        /* --- Holographic (Chic Pearlescent) --- */
        .bubble-holo .nico-inner {
            background: linear-gradient(124deg, rgba(255, 230, 240, 0.6), rgba(230, 255, 240, 0.6), rgba(230, 240, 255, 0.6), rgba(250, 230, 255, 0.6));
            background-size: 400% 400%;
            animation: holoFlow 8s ease infinite;
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: var(--nico-border-width, 1px) solid rgba(255, 255, 255, 0.6);
            border-top: var(--nico-border-width, 1px) solid rgba(255, 255, 255, 0.9);
            border-radius: var(--border-radius-soft);
            padding: 8px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.5);
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
            color: #4a4a4a !important;
            font-family: var(--font-chic);
            font-weight: 500;
        }

        @keyframes holoFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* --- Cyberpunk (Neon Glitch) --- */
        .bubble-cyber .nico-inner {
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 255, 0.03) 0px,
                    transparent 2px,
                    transparent 4px
                ),
                linear-gradient(135deg, rgba(10, 0, 20, 0.95), rgba(20, 5, 30, 0.95));
            border: var(--nico-border-width, 2px) solid;
            border-image: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff) 1;
            padding: 10px 24px;
            font-family: var(--font-mono);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #0ff !important;
            text-shadow:
                0 0 5px rgba(0, 255, 255, 0.7),
                0 0 20px rgba(0, 255, 255, 0.3),
                2px 0 0 rgba(255, 0, 255, 0.4),
                -2px 0 0 rgba(0, 255, 255, 0.4);
            box-shadow:
                0 0 15px rgba(255, 0, 255, 0.3),
                0 0 30px rgba(0, 255, 255, 0.15),
                inset 0 0 20px rgba(0, 255, 255, 0.05);
            animation: cyberJitter 4s infinite;
            position: relative;
        }

        .bubble-cyber .nico-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 2px,
                rgba(0, 255, 255, 0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        @keyframes cyberJitter {
            0%, 88%, 100% {
                transform: translate(0, 0) skewX(0deg);
                text-shadow:
                    0 0 5px rgba(0, 255, 255, 0.7),
                    0 0 20px rgba(0, 255, 255, 0.3),
                    2px 0 0 rgba(255, 0, 255, 0.4),
                    -2px 0 0 rgba(0, 255, 255, 0.4);
            }
            90% {
                transform: translate(3px, -2px) skewX(-2deg);
                text-shadow:
                    4px 0 0 rgba(255, 0, 255, 0.9),
                    -4px 0 0 rgba(0, 255, 255, 0.9);
            }
            92% {
                transform: translate(-2px, 1px) skewX(1deg);
            }
            94% {
                transform: translate(2px, 2px) skewX(-1deg);
                text-shadow:
                    -3px 0 0 rgba(255, 0, 255, 0.6),
                    3px 0 0 rgba(0, 255, 255, 0.6);
            }
            96% {
                transform: translate(-1px, -1px) skewX(0deg);
            }
        }

        /* --- Sticky Note (Soft Matte) --- */
        .bubble-sticky .nico-inner {
            background: #fffdf2;
            color: #4a4a4a !important;
            border: var(--nico-border-width, 1px) solid rgba(0, 0, 0, 0.05);
            padding: 12px 28px;
            font-family: var(--font-chic);
            font-style: italic;
            text-shadow: none;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.05);
            border-bottom-right-radius: 40px 6px;
            position: relative;
        }

        .bubble-sticky .nico-inner::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-1deg);
            width: 40px;
            height: 18px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: var(--border-thin);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        /* --- Retro Terminal (Sleek Slate) --- */
        .bubble-terminal .nico-inner {
            background: rgba(20, 22, 26, 0.95);
            color: #64ffda !important;
            border: var(--nico-border-width, 1px) solid rgba(100, 255, 218, 0.2);
            padding: 10px 24px;
            font-family: var(--font-mono);
            font-size: 0.95em;
            text-shadow: 0 0 8px rgba(100, 255, 218, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            position: relative;
        }

        /* --- Vaporwave (Refined Synth) --- */
        .bubble-vapor .nico-inner {
            background: linear-gradient(135deg, #2b1b3d 0%, #1a0b2e 100%);
            border: var(--nico-border-width, 1px) solid rgba(255, 107, 181, 0.4);
            border-radius: var(--border-radius-soft);
            padding: 10px 28px;
            font-family: var(--font-chic);
            color: #ff6bb5 !important;
            text-shadow: 0 0 15px rgba(255, 107, 181, 0.5);
            box-shadow: 0 10px 40px rgba(255, 107, 181, 0.15), inset 0 0 20px rgba(255, 107, 181, 0.05);
        }

        .bubble-vapor .nico-inner::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background-image: linear-gradient(90deg, rgba(255, 107, 181, 0.1) 1px, transparent 1px), linear-gradient(0deg, rgba(255, 107, 181, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1), transparent);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1), transparent);
        }

        /* --- Fantasy RPG (Minimal Dark Academia) --- */
        .bubble-rpg .nico-inner {
            background: #2a2722;
            border: var(--nico-border-width, 1px) solid #cfaa70;
            border-radius: 4px;
            padding: 12px 28px;
            font-family: 'Playfair Display', 'Georgia', serif;
            color: #e8dcc7 !important;
            text-shadow: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(207, 170, 112, 0.2);
            display: inline-block;
            letter-spacing: 0.5px;
        }

        /* --- Cute Cat (Sleek Minimalist Ears) --- */
        .bubble-cat .nico-inner {
            background: #1a1a1a;
            color: #f0f0f0 !important;
            border: var(--nico-border-width, 1px) solid #333;
            border-radius: var(--border-radius-pill);
            padding: 10px 24px;
            font-family: var(--font-chic);
            font-weight: 500;
            text-shadow: none;
            position: relative;
            box-shadow: var(--shadow-soft);
            margin-top: 15px;
            display: inline-block;
        }

        .bubble-cat .nico-inner::before,
        .bubble-cat .nico-inner::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 16px;
            height: 16px;
            border: var(--nico-border-width, 1px) solid #444;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0));
            z-index: -1;
        }

        .bubble-cat .nico-inner::before {
            left: 20px;
            transform: rotate(45deg) skew(10deg, 10deg);
            border-bottom: none;
            border-right: none;
            border-radius: 3px 0 0 0;
        }

        .bubble-cat .nico-inner::after {
            right: 20px;
            transform: rotate(-45deg) skew(-10deg, -10deg);
            border-bottom: none;
            border-left: none;
            border-radius: 0 3px 0 0;

        /* --- Cute Frog (Chic Geometric Bumps) --- */
        .bubble-frog .nico-inner {
            background: #d4e0ce;
            color: #3b5235 !important;
            border: var(--nico-border-width, 1px) solid rgba(133, 163, 122, 0.4);

            font-weight: 600;
            text-shadow: none;

            box-shadow: 0 10px 30px rgba(133, 163, 122, 0.2);

            display: inline-block;

        .bubble-frog .nico-inner::before,
        .bubble-frog .nico-inner::after {
            content: '';
            position: absolute;
            top: -14px;
            width: 24px;
            height: 24px;
            background: #d4e0ce;
            border-radius: 50%;
            z-index: -1;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.8);
            border: var(--nico-border-width, 1px) solid rgba(133, 163, 122, 0.2);
        }

        .bubble-frog .nico-inner::before {
            left: 25px;
        }

        .bubble-frog .nico-inner::after {
            right: 25px;
        }

        /* --- Cute Worm (Inching Segmented Creeper) --- */
        .bubble-worm .nico-inner {
            background: var(--nico-primary, #b5e48c);
            color: #1a3a2a !important;
            border: var(--nico-border-width, 2px) solid var(--nico-accent, #76c893);

            padding: 10px 24px 10px 30px;

            animation: inchwormStretch 2s ease-in-out infinite alternate;
            transform-origin: left center;
        }

        .bubble-worm .nico-inner::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 40%;
            width: 4px;
            height: 4px;
            background: #1a3a2a;
            border-radius: 50%;
            box-shadow: 6px 0 0 #1a3a2a;

        @keyframes inchwormStretch {
            0% {
                transform: scaleX(1);
                border-radius: 30px;
            }

            100% {
                transform: scaleX(1.15) scaleY(0.9);

            }

        /* --- Cute Slime (Jiggly Glass Droplet) --- */
        .bubble-slime .nico-inner {
            background: var(--nico-primary, rgba(160, 240, 210, 0.4));
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);

            border: var(--nico-border-width, 2px) solid var(--nico-accent, rgba(255, 255, 255, 0.7));

        .bubble-slime .nico-inner::before {
            content: '';

            left: 20%;
            width: 20px;
            height: 8px;

            border-radius: 50%;
            transform: rotate(-15deg);
            filter: blur(0.5px);
        }

        @keyframes slimeSquish {
            0% {
                transform: scaleY(1) scaleX(1);
                border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
            }

            100% {
                transform: scaleY(0.9) scaleX(1.05);
                border-radius: 50% 50% 40% 40% / 50% 50% 50% 50%;
            }

             /* --- Spooky Ghost (Poltergeist Companion) --- */
        .bubble-ghost .nico-inner {
            background: var(--nico-primary, rgba(40, 42, 54, 0.95));
            color: #f8f8f2 !important;
            border: var(--nico-border-width, 1px) solid var(--nico-accent, rgba(139, 233, 253, 0.4));

        /* Ghost body */

            content: '';

            left: -16px;

            transform: translateY(-55%);

            height: 38px;

                100% 75%,
                92% 100%, 83% 78%, 75% 100%, 67% 78%, 58% 100%, 50% 78%, 42% 100%, 33% 78%, 25% 100%, 17% 78%, 8% 100%,

        /* ============================================================
           CENTERED ALERT SYSTEM
           ============================================================ */
        #alert-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10000;
        }

        .event-alert {
            position: absolute;
            text-align: center;
            pointer-events: none;
            animation: alertIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .event-alert.alert-exit {
            animation: alertOut 0.5s ease-in forwards;
        }

        @keyframes alertIn {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(40px);
                filter: blur(10px);
            }

            60% {
                transform: scale(1.08) translateY(-5px);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        @keyframes alertOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
                filter: blur(6px);
            }
        }

        .alert-box {
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 50px;
            min-width: 400px;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px var(--alert-glow, rgba(0, 229, 255, 0.2));
            border: var(--nico-border-width, 2px) solid var(--alert-border, rgba(255, 255, 255, 0.15));
        }

        .alert-icon {
            font-size: 48px;
            margin-bottom: 8px;
            animation: iconBounce 0.8s ease 0.3s;
        }

        @keyframes iconBounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }
        }

        .alert-title {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            color: var(--alert-accent, #00e5ff);
        }

        .alert-message {
            font-family: 'Arial', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .alert-sub {
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        /* Per-event alert colors */
        .alert-follow {
            --alert-accent: #00e564;
            --alert-border: rgba(0, 229, 100, 0.4);
            --alert-glow: rgba(0, 229, 100, 0.25);
        }

        .alert-sub {
            --alert-accent: #a855f7;
            --alert-border: rgba(168, 85, 247, 0.4);
            --alert-glow: rgba(168, 85, 247, 0.25);
        }

        .alert-resub {
            --alert-accent: #c084fc;
            --alert-border: rgba(192, 132, 252, 0.4);
            --alert-glow: rgba(192, 132, 252, 0.25);
        }

        .alert-giftsub {
            --alert-accent: #00e5ff;
            --alert-border: rgba(0, 229, 255, 0.4);
            --alert-glow: rgba(0, 229, 255, 0.25);

        .alert-giftbomb {

        .alert-box::after {

            left: -100%;

            height: 100%;

            animation: alertSweep 1.5s ease 0.4s;
            border-radius: 24px;
        }

        @keyframes alertSweep {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        /* --- Test Panel (only visible when opened directly in browser) --- */
        #test-panel {

            bottom: 20px;
            right: 20px;

            overflow-x: hidden;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: none;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;

            font-weight: 600;
            color: #8be9fd;

            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            transition: background 0.15s;

        #test-panel summary:hover {
            background: rgba(255,255,255,0.05);

        #test-panel summary::-webkit-details-marker { display: none; }

            content: '▶';
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            transition: transform 0.2s;
        }
        #test-panel details[open] > summary::before {
            transform: rotate(90deg);
        }
        #test-panel details .section-body {
            padding: 6px 14px 14px;
        }

        /* --- Range sliders --- */
        .nico-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            margin: 6px 0 2px;
        }
        .nico-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #8be9fd;
            cursor: pointer;
            border: 2px solid rgba(0,0,0,0.3);
            box-shadow: 0 0 6px rgba(139,233,253,0.4);
        }
        .nico-range::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #8be9fd;
            cursor: pointer;
            border: 2px solid rgba(0,0,0,0.3);
        }
        .range-val {
            color: #8be9fd;
            font-weight: 700;
            font-size: 12px;
        }

        /* --- Color pool swatches --- */
        .pool-swatch {
            width: 24px; height: 24px;
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
        }
        .pool-swatch:hover {
            transform: scale(1.2);
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        .pool-swatch:hover::after {
            content: '×';
            position: absolute;
            top: -2px; right: -2px;
            font-size: 10px;
            color: #fff;
            background: rgba(255,0,0,0.7);
            border-radius: 50%;
            width: 12px; height: 12px;

        /* --- Color pool tabs --- */

    </style>
</head>

    <script>
        // ============================================================

        // --- Configuration ---
        const config = {
            // Streamer.bot WebSocket connection
            sbHost: '127.0.0.1',
            sbPort: 8080,
            sbEndpoint: '/',

            // Overlay settings
            scrollSpeed: 8,
            fontSize: 32,
            fontFamily: 'Arial Black',
            fontUrl: '',
            textColor: '',
            textShadow: 'heavy',
            borderThickness: 1,
            opacity: 1.0,
            colorPool: '',
            colorPoolPrimary: '',
            colorPoolAccent: '',
            colorPoolText: '',
            movementMode: 'scroll',  // 'scroll', 'plaster', 'float', 'zoom', 'swing'
            animationMode: 'none',   // 'none', 'letter', 'word'
            bubbleStyle: 'none',     // 'none', 'glass', 'neumorphic', 'gradient-edge', 'editorial', 'rounded', 'speech', 'glow', 'holo', 'cyber', 'sticky', 'terminal', 'vapor', 'rpg', 'cat', 'frog', 'worm', 'slime', 'ghost'

            showUsername: 'inline',

        };

        // --- Parse URL params for config overrides ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('speed')) config.scrollSpeed = parseFloat(urlParams.get('speed'));
        if (urlParams.get('fontSize')) config.fontSize = parseInt(urlParams.get('fontSize'));
        if (urlParams.get('font')) config.fontFamily = urlParams.get('font');
        if (urlParams.get('fontUrl')) config.fontUrl = urlParams.get('fontUrl');
        if (urlParams.get('color')) config.textColor = '#' + urlParams.get('color');
        if (urlParams.get('primary')) config.primaryColor = '#' + urlParams.get('primary');
        if (urlParams.get('accent')) config.accentColor = '#' + urlParams.get('accent');
        if (urlParams.get('shadow')) config.textShadow = urlParams.get('shadow');
        if (urlParams.get('border')) config.borderThickness = parseFloat(urlParams.get('border'));
        if (urlParams.get('opacity')) config.opacity = parseFloat(urlParams.get('opacity'));
        if (urlParams.get('movement')) config.movementMode = urlParams.get('movement');
        if (urlParams.get('animation')) config.animationMode = urlParams.get('animation');

            const up = urlParams.get('username');
            config.showUsername = (up === 'yes' || up === 'true') ? 'inline' : (up === 'no' || up === 'false') ? 'hidden' : up;
        }
        if (urlParams.get('delay')) config.letterDelay = parseInt(urlParams.get('delay'));
        if (urlParams.get('host')) config.sbHost = urlParams.get('host');
        if (urlParams.get('port')) config.sbPort = parseInt(urlParams.get('port'));
        if (urlParams.get('eventMode')) config.eventMode = urlParams.get('eventMode');
        if (urlParams.get('alertDuration')) config.alertDuration = parseFloat(urlParams.get('alertDuration'));

        // --- Font Loading ---
        let fontLoaded = false;
        function loadFont() {
            if (fontLoaded) return;
            // Priority: fontUrl > fontFamily (auto Google Fonts lookup)
            if (config.fontUrl) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = config.fontUrl;
                document.head.appendChild(link);
                fontLoaded = true;
            } else if (config.fontFamily && config.fontFamily !== 'Arial Black') {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(config.fontFamily)}:wght@700;900&display=swap`;
                document.head.appendChild(link);
                fontLoaded = true;
            }
        }

        // --- Lane Management ---
        let lanes = [];
        const LANE_PADDING = 8;

        function initLanes() {
            const h = window.innerHeight;
            const laneH = config.fontSize * 1.6;
            config.laneCount = Math.floor(h / (laneH + LANE_PADDING));
            lanes = new Array(config.laneCount).fill(0);
        }

        function getAvailableLane() {
            const now = Date.now();
            let freeLanes = [];
            for (let i = 0; i < lanes.length; i++) {
                if (lanes[i] <= now) freeLanes.push(i);
            }
            if (freeLanes.length === 0) {
                let earliest = 0;
                for (let i = 1; i < lanes.length; i++) {
                    if (lanes[i] < lanes[earliest]) earliest = i;
                }
                return earliest;
            }
            return freeLanes[Math.floor(Math.random() * freeLanes.length)];
        }

        function reserveLane(idx, durationMs) {
            lanes[idx] = Date.now() + Math.min(durationMs * 0.35, 3000);
        }

        // --- Active message tracking ---
        let activeMessages = 0;

        // --- Spawn a message ---
        function spawnMessage(text, username, userColor, extraClasses) {
            if (activeMessages >= config.maxMessages) return;
            const container = document.getElementById('niconico-container');
            if (!container) return;

            const msg = document.createElement('div');
            msg.classList.add('nico-msg', `move-${config.movementMode}`, `shadow-${config.textShadow}`, `bubble-${config.bubbleStyle}`);
            if (extraClasses) extraClasses.forEach(c => msg.classList.add(c));

            const speed = config.scrollSpeed + (Math.random() * 2 - 1);
            msg.style.setProperty('--nico-speed', `${speed}s`);
            msg.style.setProperty('--nico-font-size', `${config.fontSize}px`);
            msg.style.setProperty('--nico-font', config.fontFamily);
            msg.style.setProperty('--nico-border-width', `${config.borderThickness}px`);
            msg.style.opacity = config.opacity;

            // Strategy: pick from specific pool -> fall back to general pool -> fall back to static config color
            const getPoolColor = (specificPoolKey, staticColor) => {
                let poolStr = config[specificPoolKey];
                if (!poolStr && config.colorPool) poolStr = config.colorPool;

                if (poolStr) {
                    const pool = poolStr.split(',').map(c => c.trim()).filter(c => c);
                    if (pool.length > 0) {
                        return pool[Math.floor(Math.random() * pool.length)];
                    }
                }
                return staticColor;
            };

            const pickPrimary = getPoolColor('colorPoolPrimary', config.primaryColor);
            if (pickPrimary) msg.style.setProperty('--nico-primary', pickPrimary);

            const pickAccent = getPoolColor('colorPoolAccent', config.accentColor);
            if (pickAccent) msg.style.setProperty('--nico-accent', pickAccent);

            const pickText = getPoolColor('colorPoolText', config.textColor);
            msg.style.setProperty('--nico-color', userColor || pickText || '#FFFFFF');

            if (config.movementMode === 'scroll' && config.chatDisplayMode === 'niconico') {
                const lane = getAvailableLane();
                const laneH = config.fontSize * 1.6;
                msg.style.top = `${lane * (laneH + LANE_PADDING) + 10}px`;
                reserveLane(lane, speed * 1000);
            } else if (config.movementMode === 'plaster' && config.chatDisplayMode === 'niconico') {
                msg.style.top = `${Math.random() * 70 + 10}vh`;
                msg.style.left = `${Math.random() * 60 + 10}vw`;
            } else if (config.movementMode === 'float' && config.chatDisplayMode === 'niconico') {
                msg.style.top = `0px`;
                msg.style.left = `${Math.random() * 80 + 10}vw`;
            } else if ((config.movementMode === 'zoom' || config.movementMode === 'swing') && config.chatDisplayMode === 'niconico') {
                msg.style.top = `${Math.random() * 60 + 10}vh`;
                msg.style.left = `${Math.random() * 60 + 10}vw`;
            }

            const inner = document.createElement('span');
            inner.classList.add('nico-inner');
            
            let badgeSpan = null;
            if (config.showUsername !== 'hidden' && username) {
                msg.classList.add(`user-layout-${config.showUsername}`);
                msg.classList.add(`user-theme-${config.userTheme}`);
                
                const uSpan = document.createElement('span');
                uSpan.classList.add('nico-username');
                uSpan.textContent = config.showUsername === 'inline' ? username + ':' : username;
                
                let uColor = '#FFFFFF';
                if (config.userColorSource === 'twitch' && userColor) uColor = userColor;
                else if (config.userColorSource === 'pool') uColor = getPoolColor('colorPoolText', config.textColor) || '#FFFFFF';
                else if (config.userColorSource === 'black') uColor = '#000000';
                else if (config.userTheme === 'light' && config.userColorSource === 'twitch') uColor = userColor || '#111111';
                
                uSpan.style.setProperty('--user-color', uColor);
                if (config.userTheme !== 'light' && config.userTheme !== 'dark' && config.userTheme !== 'clear' || config.userColorSource === 'twitch') {
                     uSpan.style.color = uColor;
                }
                
                uSpan.style.fontSize = `${config.userSize}em`;
                
                if (config.showUsername === 'inline') {
                    inner.appendChild(uSpan);
                } else {
                    badgeSpan = uSpan;
                }
            }

            const textContainer = document.createElement('span');
            textContainer.classList.add('nico-text-content');

            if (config.animationMode === 'letter') {
                text.split('').forEach((ch, i) => {
                    const s = document.createElement('span');
                    s.classList.add('nico-char');
                    s.textContent = ch === ' ' ? '\u00A0' : ch;
                    s.style.animationDelay = `${i * config.letterDelay}ms`;
                    textContainer.appendChild(s);
                });
            } else if (config.animationMode === 'word') {
                text.split(' ').forEach((word, i, arr) => {
                    const s = document.createElement('span');
                    s.classList.add('nico-char');
                    s.textContent = word;
                    s.style.animationDelay = `${i * config.letterDelay * 3}ms`;
                    textContainer.appendChild(s);
                    if (i < arr.length - 1) {
                        const sp = document.createElement('span');
                        sp.classList.add('nico-char');
                        sp.textContent = '\u00A0';
                        sp.style.animationDelay = `${i * config.letterDelay * 3}ms`;
                        textContainer.appendChild(sp);
                    }
                });
            } else {
                textContainer.textContent = text;
            }

            inner.appendChild(textContainer);
            msg.appendChild(inner);
            if (badgeSpan) msg.appendChild(badgeSpan);
            
            // Container class updates & Animation mappings
            if (config.chatDisplayMode === 'vertical') {
                container.className = 'layout-vertical';
                msg.classList.add(`move-${config.movementMode}`);
            } else if (config.chatDisplayMode === 'horizontal') {
                container.className = 'layout-horizontal';
                msg.classList.add(`move-${config.movementMode}`);
            } else {
                container.className = '';
            }
            
            container.appendChild(msg);
            activeMessages++;

            // Cleanup Logic
            if (config.chatDisplayMode === 'niconico') {
                setTimeout(() => {
                    if (msg.parentNode) msg.parentNode.removeChild(msg);
                    activeMessages--;
                }, (speed + 0.5) * 1000);
            } else {
                // Keep history limited to roughly 40 items for vertical/horizontal
                setTimeout(() => {
                    if (container.children.length > 40) {
                        try {
                            container.removeChild(container.firstChild);
                            activeMessages--;
                        } catch(e) {}
                    }
                }, 500); // Check length slightly after append
            }
        }

        // ============================================================
        // CENTERED ALERT SYSTEM
        // ============================================================
        const alertQueue = [];
        let alertActive = false;

        const EVENT_META = {
            follow: { icon: '👤', title: 'NEW FOLLOWER', color: '#00e564' },
            sub: { icon: '⭐', title: 'NEW SUB', color: '#a855f7' },
            resub: { icon: '🌟', title: 'RESUB', color: '#c084fc' },
            giftsub: { icon: '🎁', title: 'GIFT SUB', color: '#00e5ff' },
            giftbomb: { icon: '💣', title: 'GIFT BOMB', color: '#22d3ee' },
            raid: { icon: '⚔️', title: 'RAID', color: '#ffd700' },
            cheer: { icon: '💎', title: 'CHEER', color: '#ff69b4' },
        };

        function showCenteredAlert(eventType, message, subtitle) {
            alertQueue.push({ eventType, message, subtitle });
            if (!alertActive) processAlertQueue();
        }

        function processAlertQueue() {
            if (alertQueue.length === 0) { alertActive = false; return; }
            alertActive = true;
            const { eventType, message, subtitle } = alertQueue.shift();
            const meta = EVENT_META[eventType] || EVENT_META.follow;

            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.classList.add('event-alert', `alert-${eventType}`);

            alert.innerHTML = `
                <div class="alert-box">
                    <div class="alert-icon">${meta.icon}</div>
                    <div class="alert-title">${meta.title}</div>
                    <div class="alert-message">${message}</div>
                    ${subtitle ? `<div class="alert-sub">${subtitle}</div>` : ''}
                </div>
            `;

            container.appendChild(alert);

            // Hold, then fade out
            setTimeout(() => {
                alert.classList.add('alert-exit');
                setTimeout(() => {
                    if (alert.parentNode) alert.parentNode.removeChild(alert);
                    processAlertQueue();
                }, 500);
            }, config.alertDuration * 1000);
        }

        // --- Unified Stream Event Handler ---
        function handleStreamEvent(eventType, message, subtitle, scrollColor) {
            if (config.eventMode === 'off') return;

            if (config.eventMode === 'scroll' || config.eventMode === 'both') {
                const meta = EVENT_META[eventType] || EVENT_META.follow;
                const scrollText = `${meta.icon} ${message}`;
                spawnMessage(scrollText, null, scrollColor || meta.color, ['nico-event', `event-${eventType}`]);
            }

            if (config.eventMode === 'alert' || config.eventMode === 'both') {
                showCenteredAlert(eventType, message, subtitle);
            }
        }
