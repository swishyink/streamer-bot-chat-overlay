        // --- Streamer.bot WebSocket Connection ---
        let sbClient = null;

        async function connectToStreamerBot() {
            const statusEl = document.getElementById('connection-status');

            if (typeof StreamerbotClient === 'undefined') {
                console.warn('StreamerbotClient not loaded — running in offline/test mode');
                if (statusEl) {
                    statusEl.textContent = '⬤ Offline mode (CDN not loaded)';
                    statusEl.className = 'status-disconnected';
                }
                return;
            }

            if (statusEl) {
                statusEl.textContent = '⬤ Connecting to Streamer.bot...';
                statusEl.className = 'status-connecting';
            }

            try {
                sbClient = new StreamerbotClient({
                    host: config.sbHost,
                    port: config.sbPort,
                    endpoint: config.sbEndpoint,
                    subscribe: {
                        'Twitch': [
                            'ChatMessage',
                            'Follow',
                            'Sub',
                            'ReSub',
                            'GiftSub',
                            'GiftBomb',
                            'Raid',
                            'Cheer'
                        ]
                    },
                    onConnect: () => {
                        console.log('✅ Connected to Streamer.bot');
                        if (statusEl) {
                            statusEl.textContent = `⬤ Connected (${config.sbHost}:${config.sbPort})`;
                            statusEl.className = 'status-connected';
                        }
                    },
                    onDisconnect: () => {
                        console.log('❌ Disconnected from Streamer.bot');
                        if (statusEl) {
                            statusEl.textContent = '⬤ Disconnected — will retry...';
                            statusEl.className = 'status-disconnected';
                        }
                    },
                    onError: (err) => {
                        console.error('Streamer.bot WS error:', err);
                        if (statusEl) {
                            statusEl.textContent = '⬤ Connection error — retrying...';
                            statusEl.className = 'status-disconnected';
                        }
                    },
                    retries: -1
                });

                // --- Chat Messages ---
                sbClient.on('Twitch.ChatMessage', (payload) => {
                    const data = payload.data;
                    if (!data) return;
                    const text = data.message?.message || data.text || '';
                    const username = data.message?.displayName || data.user?.name || 'Anon';
                    const userColor = data.message?.color || data.user?.color || null;

                    if (text.trim().toLowerCase() === config.testCommand.toLowerCase()) {
                        spawnTestMessages(8);
                        return;
                    }
                    spawnMessage(text, username, userColor);
                });

                // --- Follow ---
                sbClient.on('Twitch.Follow', (payload) => {
                    const d = payload.data;
                    const name = d?.user_name || d?.userName || d?.user?.name || 'Someone';
                    handleStreamEvent('follow', name, 'just followed!');
                });

                // --- Sub ---
                sbClient.on('Twitch.Sub', (payload) => {
                    const d = payload.data;
                    const name = d?.user_name || d?.userName || d?.user?.name || 'Someone';
                    const tier = d?.tier || d?.sub_tier || '1000';
                    const tierName = tier === '2000' ? 'Tier 2' : tier === '3000' ? 'Tier 3' : 'Tier 1';
                    handleStreamEvent('sub', name, `subscribed at ${tierName}!`);
                });

                // --- ReSub ---
                sbClient.on('Twitch.ReSub', (payload) => {
                    const d = payload.data;
                    const name = d?.user_name || d?.userName || d?.user?.name || 'Someone';
                    const months = d?.cumulativeMonths || d?.cumulative_months || '?';
                    const tier = d?.tier || d?.sub_tier || '1000';
                    const tierName = tier === '2000' ? 'Tier 2' : tier === '3000' ? 'Tier 3' : 'Tier 1';
                    handleStreamEvent('resub', name, `resubbed for ${months} months (${tierName})!`);
                });

                // --- Gift Sub ---
                sbClient.on('Twitch.GiftSub', (payload) => {
                    const d = payload.data;
                    const gifter = d?.user_name || d?.userName || d?.user?.name || 'Someone';
                    const recipient = d?.recipient_user_name || d?.recipientUserName || 'a viewer';
                    handleStreamEvent('giftsub', `${gifter} → ${recipient}`, 'gifted a sub!');
                });

                // --- Gift Bomb ---
                sbClient.on('Twitch.GiftBomb', (payload) => {
                    const d = payload.data;
                    const gifter = d?.user_name || d?.userName || d?.user?.name || 'Someone';
                    const count = d?.gifts || d?.total_gifts || d?.totalGifts || '?';
                    const isAnon = d?.isAnonymous || d?.is_anonymous || false;
                    const name = isAnon ? 'Anonymous' : gifter;
                    handleStreamEvent('giftbomb', `${name} × ${count} subs!`, 'gift bomb!');
                });

                // --- Raid ---
                sbClient.on('Twitch.Raid', (payload) => {
                    const d = payload.data;
                    const from = d?.from_broadcaster_user_name || d?.fromBroadcasterUserName || d?.user?.name || 'Someone';
                    const viewers = d?.viewers || d?.viewer_count || '?';
                    handleStreamEvent('raid', `${from} with ${viewers} viewers!`, 'INCOMING RAID');
                });

                // --- Cheer ---
                sbClient.on('Twitch.Cheer', (payload) => {
                    const d = payload.data;
                    const name = d?.user_name || d?.userName || d?.user?.name || 'Someone';
                    const bits = d?.bits || d?.bit_count || '?';
                    const msg = d?.message?.message || d?.chat_message || '';
                    const sub = msg ? `"${msg}"` : '';
                    handleStreamEvent('cheer', `${name} cheered ${bits} bits!`, sub);
                });

            } catch (err) {
                console.error('Failed to initialize Streamer.bot client:', err);
                if (statusEl) {
                    statusEl.textContent = '⬤ Failed to connect';
                    statusEl.className = 'status-disconnected';
                }
            }
        }

        // --- Detect if running in OBS or standalone browser ---
        function isOBS() {
            return navigator.userAgent.includes('OBS') ||
                window.obsstudio !== undefined ||
                urlParams.get('obs') === 'true';
        }

        // --- Update UI disabled states based on selections ---
        function updatePanelVisibility() {
            const displayMode = document.getElementById('ctrl-display-mode')?.value;
            const userShow = document.getElementById('ctrl-username')?.value;
            const userTheme = document.getElementById('ctrl-user-theme')?.value;

            // 1. Movement is disabled in static modes if it's not a supported pop-in animation
            const moveContainer = document.getElementById('ctrl-movement')?.parentElement;
            if (moveContainer) {
                // In Vertical/Horizontal, "Scroll" becomes "Slide In Side", "Float" becomes "Slide Up"
                // They all still vaguely work as pop-in animations, so we don't strictly disable them,
                // but we could. For now, we leave Movement enabled for all.
            }

            // 2. Username Dependent Fields
            const userThemeContainer = document.getElementById('ctrl-user-theme')?.parentElement;
            const userColorContainer = document.getElementById('ctrl-user-color')?.parentElement;
            const userSizeContainer = document.getElementById('ctrl-usersize')?.parentElement;

            if (userShow === 'hidden') {
                if (userThemeContainer) userThemeContainer.classList.add('disabled-field');
                if (userColorContainer) userColorContainer.classList.add('disabled-field');
                if (userSizeContainer) userSizeContainer.classList.add('disabled-field');
            } else {
                if (userThemeContainer) userThemeContainer.classList.remove('disabled-field');
                if (userColorContainer) userColorContainer.classList.remove('disabled-field');
                if (userSizeContainer) userSizeContainer.classList.remove('disabled-field');
                
                // If user theme is NOT 'match', 'dark', 'light', or 'clear', color picker might override.
                // But specifically if user color source is 'twitch' and theme is 'match', it's active.
            }
        }

        // --- Apply config from test panel controls ---
        function applyPanelConfig() {
            const panel = document.getElementById('test-panel');
            if (!panel || panel.style.display === 'none') return;

            config.chatDisplayMode = document.getElementById('ctrl-display-mode').value;
            config.movementMode = document.getElementById('ctrl-movement').value;
            config.bubbleStyle = document.getElementById('ctrl-bubble').value;
            config.animationMode = document.getElementById('ctrl-anim').value;
            config.textShadow = document.getElementById('ctrl-shadow').value;
            const bThick = document.getElementById('ctrl-border-thickness');
            if (bThick) config.borderThickness = parseFloat(bThick.value);
            const opac = document.getElementById('ctrl-opacity');
            if (opac) config.opacity = parseFloat(opac.value);
            config.scrollSpeed = parseFloat(document.getElementById('ctrl-speed').value);
            config.fontSize = parseInt(document.getElementById('ctrl-fontsize').value);
            config.showUsername = document.getElementById('ctrl-username').value;
            const utheme = document.getElementById('ctrl-user-theme');
            if (utheme) config.userTheme = utheme.value;
            const ucolor = document.getElementById('ctrl-user-color');
            if (ucolor) config.userColorSource = ucolor.value;
            const usize = document.getElementById('ctrl-usersize');
            if (usize) config.userSize = parseFloat(usize.value);
            config.eventMode = document.getElementById('ctrl-eventmode').value;
            config.alertDuration = parseFloat(document.getElementById('ctrl-alertduration').value);

            const pmId = document.getElementById('ctrl-primary');
            if (pmId && pmId.value) config.primaryColor = pmId.value;
            else config.primaryColor = '';

            const acId = document.getElementById('ctrl-accent');
            if (acId && acId.value) config.accentColor = acId.value;
            else config.accentColor = '';

            // Text Color
            const tcId = document.getElementById('ctrl-text');
            if (tcId && tcId.value) config.textColor = tcId.value;
            else config.textColor = '';

            // Color pools
            ['colorpool', 'colorpoolprimary', 'colorpoolaccent', 'colorpooltext'].forEach(key => {
                const el = document.getElementById(`ctrl-${key}`);
                if (el) {
                    let configKey = key === 'colorpool' ? 'colorPool' : 'colorPool' + key.slice(9).charAt(0).toUpperCase() + key.slice(10);
                    config[configKey] = el.value.trim();
                }
            });

            // Custom font URL
            const fontUrlVal = document.getElementById('ctrl-fonturl').value.trim();
            if (fontUrlVal && fontUrlVal !== config.fontUrl) {
                config.fontUrl = fontUrlVal;
                fontLoaded = false;
                loadFont();
            }

            updatePanelVisibility();
            initLanes();
            saveConfigToStorage();
        }

        // --- Default config snapshot for reset ---
        const DEFAULT_CONFIG = {
            chatDisplayMode: 'niconico',
            scrollSpeed: 8, fontSize: 32, fontFamily: 'Arial Black', fontUrl: '',
            textColor: '', textShadow: 'heavy', borderThickness: 1, opacity: 1.0,
            movementMode: 'scroll', animationMode: 'none', bubbleStyle: 'none',
            showUsername: 'inline', eventMode: 'both', alertDuration: 5,
            primaryColor: '', accentColor: '', colorPool: '',
            colorPoolPrimary: '', colorPoolAccent: '', colorPoolText: ''
        };

        function resetToDefaults() {
            PERSIST_KEYS.forEach(k => { if (DEFAULT_CONFIG[k] !== undefined) config[k] = DEFAULT_CONFIG[k]; });
            config.primaryColor = '';
            config.accentColor = '';
            syncPanelFromConfig();
            saveConfigToStorage();
            
            // Clear custom CSS
            const cssTag = document.getElementById('injected-custom-css');
            if (cssTag) cssTag.textContent = '';
            const cssArea = document.getElementById('ctrl-custom-css');
            if (cssArea) cssArea.value = '';
            try { localStorage.removeItem('niconico-custom-css'); } catch(e) {}
            
            updatePanelVisibility();
        }

        // --- Export all profiles as JSON download ---
        function exportProfiles() {
            const data = {
                profiles: getProfiles(),
                themePresets: getThemePresets(),
                currentConfig: getSerializableConfig()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'niconico-profiles.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- Import profiles from JSON file ---
        function importProfiles(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.profiles) {
                        const existing = getProfiles();
                        Object.assign(existing, data.profiles);
                        localStorage.setItem(PROFILES_KEY, JSON.stringify(existing));
                    }
                    if (data.themePresets) {
                        const existing = getThemePresets();
                        Object.assign(existing, data.themePresets);
                        localStorage.setItem(THEME_PRESETS_KEY, JSON.stringify(existing));
                    }
                    refreshProfileDropdown();
                    showProfileStatus(`✅ Imported ${Object.keys(data.profiles || {}).length} profile(s)`);
                } catch (err) {
                    showProfileStatus('⚠️ Invalid JSON file');
                }
            };
            reader.readAsText(file);
        }

        // --- Custom CSS injection ---
        const CUSTOM_CSS_KEY = 'niconico-custom-css';

        function applyCustomCSS(cssText) {
            let tag = document.getElementById('injected-custom-css');
            if (!tag) {
                tag = document.createElement('style');
                tag.id = 'injected-custom-css';
                document.head.appendChild(tag);
            }
            tag.textContent = cssText;
            try { localStorage.setItem(CUSTOM_CSS_KEY, cssText); } catch(e) {}
        }

        function loadCustomCSSFromStorage() {
            try {
                const css = localStorage.getItem(CUSTOM_CSS_KEY);
                if (css) {
                    applyCustomCSS(css);
                    const area = document.getElementById('ctrl-custom-css');
                    if (area) area.value = css;
                }
            } catch(e) {}
        }

        // --- Extract current theme's CSS rules for editing ---
        function extractThemeCSS(theme) {
            if (!theme || theme === 'none') return '/* No theme selected — choose a Bubble Style first */';
            const selector = `.bubble-${theme}`;
            let rules = [];
            try {
                for (const sheet of document.styleSheets) {
                    // Skip injected custom CSS sheet
                    try {
                        if (sheet.ownerNode && sheet.ownerNode.id === 'injected-custom-css') continue;
                        for (const rule of sheet.cssRules) {
                            if (rule.selectorText && rule.selectorText.includes(selector)) {
                                rules.push(rule.cssText);
                            }
                        }
                    } catch(e) { /* cross-origin sheet */ }
                }
            } catch(e) {}
            if (rules.length === 0) return `/* No CSS rules found for ${selector} */`;
            // Pretty-print: add newlines after { and before }
            return `/* === Theme: ${theme} === */\n\n` + rules.map(r => {
                return r
                    .replace(/\{\s*/g, ' {\n    ')
                    .replace(/;\s*/g, ';\n    ')
                    .replace(/\s*\}/g, '\n}');
            }).join('\n\n');
        }

        // ============================================================
        //  PERSISTENCE: localStorage auto-save, per-theme, profiles
        // ============================================================
        const STORAGE_KEY = 'niconico-config';
        const THEME_PRESETS_KEY = 'niconico-theme-presets';
        const PROFILES_KEY = 'niconico-profiles';

        // --- Serializable config keys (exclude runtime-only fields) ---
        const PERSIST_KEYS = [
            'chatDisplayMode', 'scrollSpeed', 'fontSize', 'fontFamily', 'fontUrl', 'textColor',
            'textShadow', 'borderThickness', 'opacity', 'colorPool', 'colorPoolPrimary', 'colorPoolAccent', 'colorPoolText', 'movementMode',
            'animationMode', 'bubbleStyle', 'showUsername', 'userTheme', 'userColorSource', 'userSize', 'eventMode',
            'alertDuration', 'primaryColor', 'accentColor'
        ];

        function getSerializableConfig() {
            const obj = {};
            PERSIST_KEYS.forEach(k => { if (config[k] !== undefined) obj[k] = config[k]; });
            return obj;
        }

        // --- 1. Auto-save to localStorage ---
        function saveConfigToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(getSerializableConfig()));
            } catch(e) { /* quota exceeded or private mode */ }
        }

        function loadConfigFromStorage() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const saved = JSON.parse(raw);
                PERSIST_KEYS.forEach(k => { if (saved[k] !== undefined) config[k] = saved[k]; });
                return true;
            } catch(e) { return false; }
        }

        // --- 2. Per-theme presets ---
        function getThemePresets() {
            try {
                return JSON.parse(localStorage.getItem(THEME_PRESETS_KEY) || '{}');
            } catch(e) { return {}; }
        }

        function saveThemePreset(theme) {
            if (!theme || theme === 'none') return;
            const presets = getThemePresets();
            const obj = getSerializableConfig();
            delete obj.bubbleStyle; // don't store theme inside its own preset
            presets[theme] = obj;
            try { localStorage.setItem(THEME_PRESETS_KEY, JSON.stringify(presets)); } catch(e) {}
        }

        function loadThemePreset(theme) {
            if (!theme || theme === 'none') return false;
            const presets = getThemePresets();
            if (!presets[theme]) return false;
            const saved = presets[theme];
            PERSIST_KEYS.forEach(k => {
                if (k !== 'bubbleStyle' && saved[k] !== undefined) config[k] = saved[k];
            });
            return true;
        }

        // --- 3. Named profiles ---
        function getProfiles() {
            try {
                return JSON.parse(localStorage.getItem(PROFILES_KEY) || '{}');
            } catch(e) { return {}; }
        }

        function saveProfile(name) {
            if (!name) return;
            const profiles = getProfiles();
            profiles[name] = getSerializableConfig();
            try { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); } catch(e) {}
            refreshProfileDropdown();
        }

        function loadProfile(name) {
            if (!name) return false;
            const profiles = getProfiles();
            if (!profiles[name]) return false;
            const saved = profiles[name];
            PERSIST_KEYS.forEach(k => { if (saved[k] !== undefined) config[k] = saved[k]; });
            syncPanelFromConfig();
            saveConfigToStorage();
            return true;
        }

        function deleteProfile(name) {
            if (!name) return;
            const profiles = getProfiles();
            delete profiles[name];
            try { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); } catch(e) {}
            refreshProfileDropdown();
        }

        function refreshProfileDropdown() {
            const sel = document.getElementById('ctrl-profile-list');
            if (!sel) return;
            const profiles = getProfiles();
            sel.innerHTML = '<option value="">— select —</option>';
            Object.keys(profiles).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
        }

        function showProfileStatus(msg) {
            const el = document.getElementById('profile-status');
            if (el) {
                el.textContent = msg;
                setTimeout(() => { el.textContent = ''; }, 3000);
            }
        }

        // --- Sync panel UI controls FROM config object ---
        function syncPanelFromConfig() {
            const panel = document.getElementById('test-panel');
            if (!panel) return;
            const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
            setVal('ctrl-display-mode', config.chatDisplayMode);
            setVal('ctrl-movement', config.movementMode);
            setVal('ctrl-bubble', config.bubbleStyle);
            setVal('ctrl-anim', config.animationMode);
            setVal('ctrl-shadow', config.textShadow);
            setVal('ctrl-border-thickness', config.borderThickness);
            setVal('ctrl-opacity', config.opacity);
            setVal('ctrl-speed', config.scrollSpeed);
            setVal('ctrl-fontsize', config.fontSize);
            setVal('ctrl-username', config.showUsername);
            setVal('ctrl-user-theme', config.userTheme);
            setVal('ctrl-user-color', config.userColorSource);
            setVal('ctrl-usersize', config.userSize);
            setVal('ctrl-eventmode', config.eventMode);
            setVal('ctrl-alertduration', config.alertDuration);
            setVal('ctrl-primary', config.primaryColor || '');
            setVal('ctrl-accent', config.accentColor || '');
            setVal('ctrl-fonturl', config.fontUrl || '');
            setVal('ctrl-text', config.textColor || '');
            setVal('ctrl-colorpool', config.colorPool || '');
            setVal('ctrl-colorpoolprimary', config.colorPoolPrimary || '');
            setVal('ctrl-colorpoolaccent', config.colorPoolAccent || '');
            setVal('ctrl-colorpooltext', config.colorPoolText || '');
            // Sync color pickers
            const pp = document.getElementById('ctrl-primary-picker');
            if (pp && config.primaryColor && /^#[0-9a-f]{6}$/i.test(config.primaryColor)) pp.value = config.primaryColor;
            const ap = document.getElementById('ctrl-accent-picker');
            if (ap && config.accentColor && /^#[0-9a-f]{6}$/i.test(config.accentColor)) ap.value = config.accentColor;
            const tp = document.getElementById('ctrl-text-picker');
            if (tp && config.textColor && /^#[0-9a-f]{6}$/i.test(config.textColor)) tp.value = config.textColor;
        }

        // --- Init ---
        function init() {
            // Hydrate config from localStorage (URL params already applied above)
            const hasUrlParams = window.location.search.length > 1;
            if (!hasUrlParams) loadConfigFromStorage();

            // Generate exact theme matches for user-theme-match badges dynamically
            try {
                let matchCSS = '';
                for (let i=0; i < document.styleSheets.length; i++) {
                    const sheet = document.styleSheets[i];
                    if (sheet.ownerNode && sheet.ownerNode.id === 'injected-custom-css') continue;
                    for (let j = 0; j < sheet.cssRules.length; j++) {
                        const rule = sheet.cssRules[j];
                        if (rule.selectorText && rule.selectorText.includes('.nico-inner') && rule.selectorText.includes('.bubble-')) {
                            const themeClass = rule.selectorText.split('.nico-inner')[0].trim();
                            const bg = rule.style.background || rule.style.backgroundColor;
                            const brd = rule.style.border || rule.style.borderColor || rule.style.borderTop;
                            const shadow = rule.style.boxShadow;
                            let block = '';
                            if (bg) block += `background: ${bg} !important; `;
                            if (brd) block += `border-color: ${brd} !important; border-top-color: ${brd} !important; border-bottom-color: ${brd} !important; `;
                            if (shadow) block += `box-shadow: ${shadow} !important; `;
                            if (block) matchCSS += `${themeClass} .user-theme-match.user-layout-badge-top .nico-username, ${themeClass} .user-theme-match.user-layout-badge-bottom .nico-username { ${block} }\n`;
                        }
                    }
                }
                if (matchCSS) {
                    const style = document.createElement('style');
                    style.id = 'dynamic-badge-match-css';
                    style.textContent = matchCSS;
                    document.head.appendChild(style);
                }
            } catch(e) { console.error("Could not generate badge theme matches", e); }

            initLanes();
            window.addEventListener('resize', initLanes);
            loadFont();

            // Show test panel only when NOT in OBS
            if (!isOBS()) {
                const panel = document.getElementById('test-panel');
                if (panel) {
                    panel.style.display = 'block';
                    syncPanelFromConfig();
                    updatePanelVisibility();
                    refreshProfileDropdown();
                    document.body.style.background = 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)';

                    // Wire up controls — auto-save on every change
                    document.querySelectorAll('#test-panel select, #test-panel input').forEach(el => {
                        el.addEventListener('change', applyPanelConfig);
                        // Range sliders: also fire on input for live updates
                        if (el.type === 'range') {
                            el.addEventListener('input', () => {
                                updateRangeDisplays();
                                applyPanelConfig();
                            });
                        }
                    });

                    // Range slider value displays
                    function updateRangeDisplays() {
                        const sv = document.getElementById('speed-val');
                        const fv = document.getElementById('fontsize-val');
                        const bv = document.getElementById('border-val');
                        const ov = document.getElementById('opacity-val');
                        if (sv) sv.textContent = document.getElementById('ctrl-speed').value;
                        if (fv) fv.textContent = document.getElementById('ctrl-fontsize').value;
                        if (bv) bv.textContent = document.getElementById('ctrl-border-thickness').value;
                        if (ov) ov.textContent = Math.round(document.getElementById('ctrl-opacity').value * 100);
                    }
                    updateRangeDisplays();

                    // Color picker ↔ text input sync
                    const primaryPicker = document.getElementById('ctrl-primary-picker');
                    const primaryText = document.getElementById('ctrl-primary');
                    const accentPicker = document.getElementById('ctrl-accent-picker');
                    const accentText = document.getElementById('ctrl-accent');

                    const textPicker = document.getElementById('ctrl-text-picker');
                    const textText = document.getElementById('ctrl-text');

                    primaryPicker.addEventListener('input', () => {
                        primaryText.value = primaryPicker.value;
                        applyPanelConfig();
                    });
                    primaryText.addEventListener('input', () => {
                        if (/^#[0-9a-f]{6}$/i.test(primaryText.value)) primaryPicker.value = primaryText.value;
                    });
                    accentPicker.addEventListener('input', () => {
                        accentText.value = accentPicker.value;
                        applyPanelConfig();
                    });
                    accentText.addEventListener('input', () => {
                        if (/^#[0-9a-f]{6}$/i.test(accentText.value)) accentPicker.value = accentText.value;
                    });
                    textPicker.addEventListener('input', () => {
                        textText.value = textPicker.value;
                        applyPanelConfig();
                    });
                    textText.addEventListener('input', () => {
                        if (/^#[0-9a-f]{6}$/i.test(textText.value)) textPicker.value = textText.value;
                    });

                    // Color pool swatch management
                    function renderPoolSwatches() {
                        const targetKey = document.getElementById('ctrl-pool-target').value;
                        const container = document.getElementById('color-pool-swatches');
                        const hiddenId = 'ctrl-' + targetKey.toLowerCase();
                        const hidden = document.getElementById(hiddenId);

                        const pool = hidden && hidden.value ? hidden.value.split(',').map(c => c.trim()).filter(c => c) : [];
                        container.innerHTML = '';
                        pool.forEach((color, idx) => {
                            const swatch = document.createElement('div');
                            swatch.className = 'pool-swatch';
                            swatch.style.background = color;
                            swatch.title = `${color} — click to remove`;
                            swatch.addEventListener('click', () => {
                                pool.splice(idx, 1);
                                if(hidden) hidden.value = pool.join(', ');
                                renderPoolSwatches();
                                applyPanelConfig();
                            });
                            container.appendChild(swatch);
                        });
                    }

                    // Tab switching logic
                    const poolTabs = document.querySelectorAll('.pool-tab');
                    const targetHidden = document.getElementById('ctrl-pool-target');
                    poolTabs.forEach(tab => {
                        tab.addEventListener('click', () => {
                            poolTabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');
                            targetHidden.value = tab.getAttribute('data-target');
                            renderPoolSwatches();
                        });
                    });

                    document.getElementById('btn-add-pool-color').addEventListener('click', () => {
                        const picker = document.getElementById('ctrl-pool-picker');
                        const targetKey = document.getElementById('ctrl-pool-target').value;
                        const hiddenId = 'ctrl-' + targetKey.toLowerCase();
                        const hidden = document.getElementById(hiddenId);

                        const pool = hidden && hidden.value ? hidden.value.split(',').map(c => c.trim()).filter(c => c) : [];
                        pool.push(picker.value);
                        if(hidden) hidden.value = pool.join(', ');
                        renderPoolSwatches();
                        applyPanelConfig();
                    });
                    document.getElementById('btn-clear-pool').addEventListener('click', () => {
                        const targetKey = document.getElementById('ctrl-pool-target').value;
                        const hiddenId = 'ctrl-' + targetKey.toLowerCase();
                        const hidden = document.getElementById(hiddenId);
                        if(hidden) hidden.value = '';
                        renderPoolSwatches();
                        applyPanelConfig();
                    });
                    renderPoolSwatches();

                    // Enter key on custom message
                    document.getElementById('ctrl-message').addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            applyPanelConfig();
                            const text = document.getElementById('ctrl-message').value || 'Hello NicoNico!';
                            spawnMessage(text, 'TestUser', '#00e5ff');
                        }
                    });

                    // Per-theme preset: save old theme, load new theme when switching
                    let lastBubble = config.bubbleStyle;
                    document.getElementById('ctrl-bubble').addEventListener('change', () => {
                        saveThemePreset(lastBubble); // save settings for old theme
                        const newTheme = document.getElementById('ctrl-bubble').value;
                        config.bubbleStyle = newTheme;
                        if (loadThemePreset(newTheme)) {
                            syncPanelFromConfig();
                            updateRangeDisplays();
                            renderPoolSwatches();
                        }
                        lastBubble = newTheme;
                        saveConfigToStorage();
                    });

                    // Chat buttons
                    document.getElementById('btn-spawn').addEventListener('click', () => {
                        applyPanelConfig();
                        spawnTestMessages(8);
                    });
                    document.getElementById('btn-single').addEventListener('click', () => {
                        applyPanelConfig();
                        const text = document.getElementById('ctrl-message').value || 'Hello NicoNico!';
                        spawnMessage(text, 'TestUser', '#00e5ff');
                    });
                    document.getElementById('btn-clear').addEventListener('click', () => {
                        document.getElementById('niconico-container').innerHTML = '';
                        document.getElementById('alert-container').innerHTML = '';
                        activeMessages = 0;
                        alertQueue.length = 0;
                        alertActive = false;
                    });

                    // Profile buttons
                    document.getElementById('btn-profile-save').addEventListener('click', () => {
                        applyPanelConfig();
                        const name = document.getElementById('ctrl-profile-name').value.trim();
                        if (!name) { showProfileStatus('⚠️ Enter a profile name first'); return; }
                        saveProfile(name);
                        showProfileStatus(`✅ Saved profile "${name}"`);
                    });
                    document.getElementById('btn-profile-load').addEventListener('click', () => {
                        const name = document.getElementById('ctrl-profile-list').value;
                        if (!name) { showProfileStatus('⚠️ Select a profile to load'); return; }
                        if (loadProfile(name)) {
                            showProfileStatus(`📂 Loaded profile "${name}"`);
                        } else {
                            showProfileStatus('⚠️ Profile not found');
                        }
                    });
                    document.getElementById('btn-profile-delete').addEventListener('click', () => {
                        const name = document.getElementById('ctrl-profile-list').value;
                        if (!name) { showProfileStatus('⚠️ Select a profile to delete'); return; }
                        deleteProfile(name);
                        showProfileStatus(`🗑️ Deleted profile "${name}"`);
                    });

                    // Import / Export / Reset
                    document.getElementById('btn-profile-export').addEventListener('click', () => {
                        exportProfiles();
                        showProfileStatus('📤 Exported profiles to JSON');
                    });
                    document.getElementById('btn-profile-import').addEventListener('click', () => {
                        document.getElementById('profile-import-file').click();
                    });
                    document.getElementById('profile-import-file').addEventListener('change', (e) => {
                        if (e.target.files[0]) importProfiles(e.target.files[0]);
                        e.target.value = ''; // reset so same file can be re-imported
                    });
                    document.getElementById('btn-reset-defaults').addEventListener('click', () => {
                        resetToDefaults();
                        showProfileStatus('🔄 Reset to factory defaults');
                    });

                    // Custom CSS
                    document.getElementById('btn-apply-css').addEventListener('click', () => {
                        const css = document.getElementById('ctrl-custom-css').value;
                        applyCustomCSS(css);
                        showProfileStatus('✅ Custom CSS applied');
                    });
                    document.getElementById('btn-upload-css').addEventListener('click', () => {
                        document.getElementById('css-upload-file').click();
                    });
                    document.getElementById('css-upload-file').addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const css = ev.target.result;
                            document.getElementById('ctrl-custom-css').value = css;
                            applyCustomCSS(css);
                            showProfileStatus(`📁 Loaded ${file.name}`);
                        };
                        reader.readAsText(file);
                        e.target.value = '';
                    });
                    document.getElementById('btn-clear-css').addEventListener('click', () => {
                        document.getElementById('ctrl-custom-css').value = '';
                        applyCustomCSS('');
                        showProfileStatus('🗑️ Custom CSS cleared');
                    });
                    document.getElementById('btn-load-theme-css').addEventListener('click', () => {
                        const theme = document.getElementById('ctrl-bubble').value;
                        const css = extractThemeCSS(theme);
                        document.getElementById('ctrl-custom-css').value = css;
                        // Auto-open the details if closed
                        const details = document.getElementById('btn-load-theme-css').closest('details');
                        if (details) details.open = true;
                        showProfileStatus(`🎨 Loaded CSS for "${theme}" — edit and click Apply`);
                    });

                    // Load persisted custom CSS
                    loadCustomCSSFromStorage();

                    // Event test buttons
                    document.getElementById('btn-evt-follow').addEventListener('click', () => {
                        applyPanelConfig();
                        handleStreamEvent('follow', randomUser(), 'just followed!');
                    });
                    document.getElementById('btn-evt-sub').addEventListener('click', () => {
                        applyPanelConfig();
                        handleStreamEvent('sub', randomUser(), 'subscribed at Tier 1!');
                    });
                    document.getElementById('btn-evt-raid').addEventListener('click', () => {
                        applyPanelConfig();
                        handleStreamEvent('raid', `${randomUser()} with ${Math.floor(Math.random() * 500 + 10)} viewers!`, 'INCOMING RAID');
                    });
                    document.getElementById('btn-evt-cheer').addEventListener('click', () => {
                        applyPanelConfig();
                        const bits = [100, 500, 1000, 5000][Math.floor(Math.random() * 4)];
                        handleStreamEvent('cheer', `${randomUser()} cheered ${bits} bits!`, '"hype hype hype!"');
                    });
                    document.getElementById('btn-evt-gift').addEventListener('click', () => {
                        applyPanelConfig();
                        handleStreamEvent('giftsub', `${randomUser()} → ${randomUser()}`, 'gifted a sub!');
                    });
                    document.getElementById('btn-evt-giftbomb').addEventListener('click', () => {
                        applyPanelConfig();
                        const count = [5, 10, 25, 50][Math.floor(Math.random() * 4)];
                        handleStreamEvent('giftbomb', `${randomUser()} × ${count} subs!`, 'GIFT BOMB!');
                    });

                    // Auto-spawn some test messages
                    setTimeout(() => spawnTestMessages(6), 500);
                }
            }

            // Connect to Streamer.bot
            connectToStreamerBot();
        }

        // Start
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
